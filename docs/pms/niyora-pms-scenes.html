<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Niyora - activity scenes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
  body {
    font-family: 'Poppins', system-ui, sans-serif; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    padding: 44px 20px 64px; color: rgba(255,255,255,0.95);
    background:
      radial-gradient(55% 45% at 30% 14%, hsla(270,50%,28%,0.7), transparent 60%),
      radial-gradient(55% 45% at 72% 88%, hsla(220,50%,18%,0.75), transparent 60%),
      linear-gradient(180deg, #0e0b14 0%, #070609 55%, #000 100%);
    background-attachment: fixed;
  }
  .hint { color: rgba(255,255,255,0.5); font-weight: 300; font-size: 13px; text-align: center; max-width: 340px; }
  .phone {
    width: 320px; height: 652px; border-radius: 46px; padding: 24px 22px 26px;
    border: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
    background: linear-gradient(180deg, #0e0b14 0%, #060509 60%, #000 100%);
    box-shadow: 0 40px 90px rgba(0,0,0,0.55);
  }
  .ctx { color: rgba(255,255,255,0.55); font-weight: 300; font-size: 13px; }
  .dots { display: flex; gap: 7px; margin: 8px 0 14px; flex-wrap: wrap; justify-content: center; max-width: 200px; }
  .d { width: 6px; height: 6px; border-radius: 3px; background: rgba(190,170,255,0.3); transition: background .4s, width .4s; cursor: pointer; }
  .d.on { background: rgba(190,170,255,0.95); width: 16px; }

  .deck { position: relative; width: 268px; flex: 1; }
  .swcard {
    position: absolute; inset: 0; border-radius: 32px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.10); box-shadow: 0 24px 54px rgba(0,0,0,0.5);
    transition: transform .75s cubic-bezier(.22,.61,.31,1), opacity .6s ease;
    will-change: transform; cursor: grab; touch-action: pan-y;
  }
  .swcard.drag { transition: transform .14s ease-out; cursor: grabbing; }
  .scene { position: absolute; inset: 0; overflow: hidden; }
  .scrim { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(8,6,14,0.12) 0%, transparent 30%, rgba(9,6,16,0.72) 72%, rgba(8,5,14,0.93) 100%); }
  .content { position: absolute; left: 0; right: 0; bottom: 0; padding: 0 26px 30px; text-align: center; z-index: 3; }
  .tag { font-size: 12px; font-weight: 300; letter-spacing: 1px; color: rgba(255,255,255,0.55); text-transform: uppercase; }
  .title { font-size: 23px; font-weight: 500; margin-top: 8px; line-height: 1.25; }
  .benefit { font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.72); margin-top: 9px; line-height: 1.5; }
  .time { font-size: 12px; font-weight: 300; color: rgba(255,255,255,0.5); margin: 13px 0 14px; }
  .begin { display: inline-block; background: linear-gradient(135deg, rgba(125,64,186,1), rgba(101,54,125,1));
    border: 1px solid rgba(150,110,187,0.5); box-shadow: 0 8px 22px rgba(104,58,172,0.5);
    color: #fff; text-transform: uppercase; letter-spacing: 2px; border-radius: 26px; padding: 13px 44px; font-weight: 500; font-size: 13px; }

  /* bases */
  .bg-cold { background: linear-gradient(180deg, hsl(210,30%,21%) 0%, hsl(214,34%,12%) 62%, #0a0d14 100%); }
  .bg-warm { background: radial-gradient(85% 60% at 50% 72%, hsl(28,52%,28%), #140d0a 80%); }
  .bg-walk { background: linear-gradient(180deg, hsl(234,34%,22%) 0%, hsl(16,44%,30%) 52%, hsl(30,58%,42%) 72%, hsl(26,38%,20%) 100%); }
  .bg-rest { background: linear-gradient(180deg, hsl(214,28%,17%) 0%, hsl(250,26%,12%) 70%, #0a0810 100%); }
  .bg-ink { background: radial-gradient(72% 55% at 50% 40%, hsl(244,26%,22%), #0b0913 80%); }
  .bg-sky { background: linear-gradient(180deg, hsl(214,44%,32%) 0%, hsl(222,38%,21%) 52%, hsl(28,34%,22%) 100%); }

  /* cold water */
  .drop { position: absolute; top: -16px; border-radius: 50%; filter: blur(0.6px);
    background: radial-gradient(circle at 38% 32%, hsla(205,78%,92%,0.8), hsla(205,66%,82%,0.16) 64%, transparent 78%); animation: softfall linear infinite; }
  @keyframes softfall { 0%{transform:translateY(0);opacity:0} 18%{opacity:0.55} 80%{opacity:0.45} 100%{transform:translateY(516px);opacity:0} }
  .ripple { position: absolute; bottom: 54px; left: 50%; width: 54px; height: 15px; margin-left: -27px; border-radius: 50%; border: 1px solid hsla(200,60%,84%,0.24); animation: rip 4.6s ease-out infinite; }
  @keyframes rip { 0%{transform:scale(0.3);opacity:0.3} 100%{transform:scale(2.0);opacity:0} }

  /* warm drink - cozy mug + tea smoke */
  .cupglow { position: absolute; top: 212px; left: 50%; width: 150px; height: 64px; margin-left: -75px; border-radius: 50%; filter: blur(11px);
    background: radial-gradient(circle, hsla(30,78%,60%,0.55), transparent 70%); }
  .mug { position: absolute; top: 200px; left: 50%; margin-left: -30px; width: 60px; height: 50px;
    border: 2px solid hsla(30,50%,82%,0.9); border-radius: 6px 6px 16px 16px;
    background: linear-gradient(180deg, hsla(28,54%,38%,0.85), hsla(24,58%,18%,0.94)); }
  .mug::after { content:''; position: absolute; right: -16px; top: 9px; width: 15px; height: 24px;
    border: 2px solid hsla(30,50%,82%,0.9); border-left: none; border-radius: 0 12px 12px 0; }
  .smoke { position: absolute; top: 132px; left: 50%; width: 15px; height: 70px; border-radius: 50%; filter: blur(6px);
    background: linear-gradient(180deg, hsla(40,30%,96%,0), hsla(40,34%,96%,0.72) 58%, hsla(40,30%,96%,0)); animation: smoke ease-in-out infinite; }
  @keyframes smoke { 0%{transform:translate(0,46px) scale(0.7);opacity:0} 25%{opacity:0.7} 60%{transform:translate(-12px,-30px) scale(1.15)} 100%{transform:translate(12px,-110px) scale(1.6);opacity:0} }

  /* walk - sunset */
  .horizon { position: absolute; left: 0; right: 0; top: 60%; height: 2px; background: linear-gradient(90deg, transparent, hsla(32,70%,66%,0.65), transparent); box-shadow: 0 0 34px hsla(30,65%,58%,0.5); }
  .ssun { position: absolute; top: 60%; left: 50%; width: 120px; height: 120px; margin: -108px 0 0 -60px; border-radius: 50%; filter: blur(2px);
    background: radial-gradient(circle, hsla(42,90%,82%,0.95), hsla(32,82%,64%,0.5) 54%, transparent 72%); animation: restpulse 7s ease-in-out infinite; }
  .scloud { position: absolute; border-radius: 40px; background: hsla(18,32%,18%,0.5); filter: blur(6px); animation: driftL linear infinite; }
  @keyframes driftL { 0%{transform:translateX(320px)} 100%{transform:translateX(-200px)} }

  /* legs up the wall */
  .restbreath { position: absolute; inset: 0; background: radial-gradient(62% 50% at 50% 42%, hsla(208,42%,52%,0.20), transparent 70%); animation: restpulse 8s ease-in-out infinite; }
  @keyframes restpulse { 0%,100%{opacity:0.32} 50%{opacity:0.72} }
  .floor { position: absolute; left: 0; right: 0; bottom: 120px; height: 1px; background: hsla(210,30%,70%,0.18); }
  .sink { position: absolute; top: -8px; border-radius: 50%; background: hsla(210,40%,84%,0.55); animation: sinkfall linear infinite; }
  @keyframes sinkfall { 0%{transform:translateY(0);opacity:0} 25%{opacity:0.5} 100%{transform:translateY(440px);opacity:0} }
  .figure { position: absolute; top: 54px; left: 50%; margin-left: -110px; width: 220px; height: 250px; opacity: 0.62; animation: restpulse 8s ease-in-out infinite; }
  .figure line, .figure circle, .figure path { stroke: hsla(210,54%,88%,0.92); fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .figure .guide { stroke: hsla(210,30%,76%,0.34); stroke-dasharray: 2 7; }

  /* journaling */
  .inkline { position: absolute; left: 34px; height: 2px; border-radius: 2px; background: hsla(250,30%,86%,0.42); transform-origin: left; animation: write ease-in-out infinite; }
  @keyframes write { 0%{transform:scaleX(0);opacity:0} 12%{opacity:0.6} 58%{transform:scaleX(1);opacity:0.6} 80%{transform:scaleX(1);opacity:0.5} 100%{transform:scaleX(1);opacity:0} }

  /* sky */
  .sun { position: absolute; top: 22%; left: 58%; width: 86px; height: 86px; border-radius: 50%; filter: blur(2px);
    background: radial-gradient(circle, hsla(40,82%,82%,0.75), transparent 70%); animation: restpulse 7s ease-in-out infinite; }
  .cloud { position: absolute; border-radius: 40px; background: hsla(220,30%,92%,0.15); filter: blur(7px); animation: driftL2 linear infinite; }
  @keyframes driftL2 { 0%{transform:translateX(320px)} 100%{transform:translateX(-200px)} }
  .fr { position: absolute; width: 20px; height: 20px; border: 2px solid hsla(40,30%,92%,0.4); z-index: 2; }
  .fr.tl { top: 22px; left: 22px; border-right: none; border-bottom: none; border-radius: 6px 0 0 0; }
  .fr.tr { top: 22px; right: 22px; border-left: none; border-bottom: none; border-radius: 0 6px 0 0; }
  .fr.bl { top: 150px; left: 22px; border-right: none; border-top: none; border-radius: 0 0 0 6px; }
  .fr.br { top: 150px; right: 22px; border-left: none; border-top: none; border-radius: 0 0 6px 0; }
</style>
</head>
<body>
  <div class="hint">swipe left for next · swipe right to bring one back · each card lives its task</div>
  <div class="phone">
    <div class="ctx">for the anxious feeling</div>
    <div class="dots" id="dots"></div>
    <div class="deck" id="deck"></div>
  </div>

<script>
  const CARDS = [
    { scene:'cold', bg:'bg-cold', tag:'soothe', title:'Cold water', benefit:'resets your whole system in seconds', time:'30 sec' },
    { scene:'warm', bg:'bg-warm', tag:'soothe', title:'Make something warm', benefit:'warmth your body reads as safe', time:'2 min' },
    { scene:'walk', bg:'bg-walk', tag:'move', title:'A slow walk', benefit:'lets the tension burn off', time:'5 min' },
    { scene:'rest', bg:'bg-rest', tag:'rest', title:'Legs up the wall', benefit:'calm without any effort', time:'3 min' },
    { scene:'ink', bg:'bg-ink', tag:'let it out', title:'Get it out of your head', benefit:'lighter once it is on paper', time:'open' },
    { scene:'sky', bg:'bg-sky', tag:'go outside', title:'Photograph the sky', benefit:'look up, let your gaze lift', time:'1 min' },
  ];
  const deck = document.getElementById('deck');
  const dotsEl = document.getElementById('dots');
  let order = CARDS.map((_, i) => i);
  const rnd = (a, b) => a + Math.random() * (b - a);

  function buildScene(el, type) {
    let h = '';
    if (type === 'cold') {
      for (let i = 0; i < 13; i++) { const s = rnd(5,11).toFixed(1); h += '<div class="drop" style="left:'+rnd(5,95).toFixed(1)+'%;width:'+s+'px;height:'+s+'px;animation-duration:'+rnd(3.4,5.6).toFixed(2)+'s;animation-delay:'+(-rnd(0,5.6)).toFixed(2)+'s"></div>'; }
      h += '<div class="ripple"></div><div class="ripple" style="animation-delay:2.2s"></div>';
    } else if (type === 'warm') {
      h += '<div class="cupglow"></div><div class="mug"></div>';
      const offs = [-14, -7, 0, 7, 14];
      for (let i = 0; i < 5; i++) h += '<div class="smoke" style="margin-left:'+offs[i]+'px;animation-duration:'+rnd(4.2,5.8).toFixed(1)+'s;animation-delay:'+(-rnd(0,5)).toFixed(1)+'s"></div>';
    } else if (type === 'walk') {
      h += '<div class="ssun"></div><div class="horizon"></div>';
      const cl = [[120,22,30],[90,18,42],[150,26,22]];
      for (let i = 0; i < 3; i++) h += '<div class="scloud" style="top:'+cl[i][2]+'%;width:'+cl[i][0]+'px;height:'+cl[i][1]+'px;animation-duration:'+rnd(20,32).toFixed(1)+'s;animation-delay:'+(-rnd(0,26)).toFixed(1)+'s"></div>';
    } else if (type === 'rest') {
      h += '<div class="restbreath"></div>';
      h += '<svg class="figure" viewBox="0 0 220 250" preserveAspectRatio="xMidYMid meet">' +
        '<line class="guide" x1="42" y1="14" x2="42" y2="230" stroke-width="2"/>' +
        '<line class="guide" x1="42" y1="230" x2="206" y2="230" stroke-width="2"/>' +
        '<line x1="60" y1="28" x2="66" y2="212" stroke-width="7"/>' +
        '<line x1="74" y1="26" x2="78" y2="210" stroke-width="7"/>' +
        '<line x1="49" y1="24" x2="62" y2="14" stroke-width="6"/>' +
        '<line x1="69" y1="14" x2="84" y2="18" stroke-width="6"/>' +
        '<path d="M66,212 Q74,228 94,227 L150,226" stroke-width="9"/>' +
        '<line x1="126" y1="229" x2="100" y2="231" stroke-width="4"/>' +
        '<line x1="150" y1="226" x2="164" y2="222" stroke-width="6"/>' +
        '<circle cx="180" cy="220" r="15" stroke-width="3"/>' +
        '</svg>';
      for (let i = 0; i < 6; i++) { const s=rnd(3,5).toFixed(1); h += '<div class="sink" style="left:'+rnd(10,90).toFixed(1)+'%;width:'+s+'px;height:'+s+'px;animation-duration:'+rnd(9,14).toFixed(1)+'s;animation-delay:'+(-rnd(0,14)).toFixed(1)+'s"></div>'; }
    } else if (type === 'ink') {
      const ys = [120,150,180,210], ws = [180,160,200,120];
      for (let i = 0; i < 4; i++) h += '<div class="inkline" style="top:'+ys[i]+'px;width:'+ws[i]+'px;animation-duration:6s;animation-delay:'+(i*1.3)+'s"></div>';
    } else if (type === 'sky') {
      h += '<div class="sun"></div>';
      const cl = [[90,26,18],[130,34,30],[70,20,46]];
      for (let i = 0; i < 3; i++) h += '<div class="cloud" style="top:'+cl[i][2]+'%;width:'+cl[i][0]+'px;height:'+cl[i][1]+'px;animation-duration:'+rnd(16,26).toFixed(1)+'s;animation-delay:'+(-rnd(0,20)).toFixed(1)+'s"></div>';
      h += '<div class="fr tl"></div><div class="fr tr"></div><div class="fr bl"></div><div class="fr br"></div>';
    }
    el.insertAdjacentHTML('beforeend', h);
  }

  CARDS.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'swcard'; el.dataset.id = i;
    el.innerHTML = '<div class="scene '+c.bg+'"></div><div class="scrim"></div>' +
      '<div class="content"><div class="tag">'+c.tag+'</div><div class="title">'+c.title+'</div>' +
      '<div class="benefit">'+c.benefit+'</div><div class="time">'+c.time+'</div><div class="begin">begin</div></div>';
    buildScene(el.querySelector('.scene'), c.scene);
    deck.appendChild(el);
    const dot = document.createElement('div'); dot.className = 'd';
    dot.addEventListener('click', () => jumpTo(i)); dotsEl.appendChild(dot);
  });

  const cardEl = id => deck.querySelector('.swcard[data-id="'+id+'"]');
  function layout(skip) {
    order.forEach((id, pos) => {
      const el = cardEl(id); if (id === skip) return;
      el.classList.remove('drag');
      el.style.transform = 'translateY('+(pos*14)+'px) scale('+(1-pos*0.05)+')';
      el.style.opacity = pos > 2 ? '0' : '1';
      el.style.zIndex = 100 - pos;
      el.style.pointerEvents = pos === 0 ? 'auto' : 'none';
    });
    [...dotsEl.children].forEach((d, k) => d.classList.toggle('on', k === order[0]));
  }
  layout();

  let startX = 0, dx = 0, dragging = false;
  function down(e) { if (e.target.closest('.begin')) return; dragging = true; dx = 0; startX = e.touches?e.touches[0].clientX:e.clientX; cardEl(order[0]).classList.add('drag'); }
  function move(e) { if (!dragging) return; const x = e.touches?e.touches[0].clientX:e.clientX; dx = x - startX; cardEl(order[0]).style.transform = 'translateX('+dx+'px) rotate('+(dx*0.025)+'deg)'; }
  function up() { if (!dragging) return; dragging = false; cardEl(order[0]).classList.remove('drag'); if (dx < -100) advance(); else if (dx > 100) rewind(); else layout(); }
  function advance() { const id = order[0], el = cardEl(id); el.style.transform = 'translate(-560px,36px) rotate(-7deg)'; el.style.opacity = '0'; order.push(order.shift()); layout(id); setTimeout(layout, 780); }
  function rewind() { const backId = order[order.length-1]; order.unshift(order.pop()); const inEl = cardEl(backId); inEl.style.transition = 'none'; inEl.style.transform = 'translate(560px,36px) rotate(7deg)'; inEl.style.opacity = '0'; inEl.style.zIndex = 200; void inEl.offsetWidth; inEl.style.transition = ''; layout(); }
  function jumpTo(cardId) { const n = CARDS.length; order = Array.from({length:n}, (_, i) => (cardId+i)%n); layout(); }
  deck.addEventListener('mousedown', down); window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  deck.addEventListener('touchstart', down, {passive:true}); deck.addEventListener('touchmove', move, {passive:true}); deck.addEventListener('touchend', up);
</script>
</body>
</html>
