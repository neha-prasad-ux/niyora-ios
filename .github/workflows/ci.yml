name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Typecheck and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Lint is omitted until eslint is set up in the project (npx expo lint
      # currently errors with "Cannot find module 'eslint'"). Tracked separately.
      - name: Test
        run: npm test --if-present
